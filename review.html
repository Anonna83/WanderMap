<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Page - WanderMap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
      background-color: #000000;
            color: white;
        }
    .gradient-bg {
      background: linear-gradient(to right, #1e3a8a, #2563eb);
    }
    .star {
            cursor: pointer;
        }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="flex justify-between items-center bg-black text-white p-4">
    <h1 class="text-xl font-bold">WanderMap</h1>
    <ul class="flex gap-6 text-sm">
      <li><a href="index.html" class="hover:underline">Home</a></li>
      <li><a href="explore.html" class="hover:underline">Explore</a></li>
      <li><a href="journal.html" class="hover:underline">Journals</a></li>
      <li><a href="services.html" class="hover:underline">Services</a></li>
      <li><a href="review.html" class="hover:underline">Review</a></li>
      <li><a href="contact.html" class="hover:underline">Contact</a></li>
      <li id="logoutBtn" style="display:none;">
        <button class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded">Logout</button>
                </li>
            </ul>
    </nav>

    <!-- Header -->
  <section class="gradient-bg text-center py-8">
    <h2 class="text-3xl font-bold text-yellow-300">Reviews</h2>
    <p class="text-sm mt-2 text-white">Share your experiences and discover what others are saying about our site!</p>
  </section>

  <!-- Notification -->
  <div id="notification" class="fixed top-4 right-4 z-50"></div>

  <!-- Stats -->
  <div class="flex justify-center gap-10 my-6">
    <div class="border border-gray-600 p-4 w-40 text-center rounded-md bg-gray-900">
      <p class="text-2xl font-bold text-yellow-300" id="totalReviews">0</p>
      <p>Total Reviews</p>
                </div>
    <div class="border border-gray-600 p-4 w-40 text-center rounded-md bg-gray-900">
      <p class="text-2xl font-bold text-yellow-300" id="avgRating">0.0</p>
      <p>Average Rating</p>
                </div>
            </div>

        <!-- Review Form -->
  <div id="reviewFormSection" class="max-w-md mx-auto border border-gray-700 p-6 bg-gray-900 rounded-md" style="display:none;">
    <h3 class="text-xl font-bold mb-4 text-yellow-300 text-center">Share Your Experience</h3>
    <form id="reviewForm">
      <div class="flex gap-2 mb-4">
        <input type="text" id="memberName" placeholder="Name *" class="w-1/2 p-2 rounded bg-gray-800 border border-gray-600" required />
        <input type="email" id="memberEmail" placeholder="Email *" class="w-1/2 p-2 rounded bg-gray-800 border border-gray-600" required />
                        </div>
      <div class="mb-4">
        <select id="reviewCategory" class="w-full p-2 rounded bg-gray-800 border border-gray-600">
          <option>Service Quality</option>
          <option>Support</option>
          <option>Pricing</option>
      </select>
                    </div>
      <div class="mb-4">
        <label class="block mb-1">Rating *</label>
        <div class="flex gap-1 text-yellow-400 text-xl">
          <span class="star">&#9734;</span>
          <span class="star">&#9734;</span>
          <span class="star">&#9734;</span>
          <span class="star">&#9734;</span>
          <span class="star">&#9734;</span>
                            </div>
        <p class="text-xs mt-1 text-gray-400">Click to rate</p>
                        </div>
      <textarea id="reviewContent" placeholder="Share your thoughts about us..." rows="4" class="w-full p-2 rounded bg-gray-800 border border-gray-600 mb-4" required></textarea>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-2 rounded flex justify-center items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
          <path d="M2.94 2.94a.75.75 0 0 1 1.13-.04l13 13a.75.75 0 0 1-1.06 1.06l-4.75-4.75a.75.75 0 0 1-.22-.53V13.5H9.25A3.25 3.25 0 0 1 6 10.25V9.5H4.25a.75.75 0 0 1-.75-.75V6.75a.75.75 0 0 1 .75-.75H6V4.25a.75.75 0 0 1 .75-.75H8.5V2.94z" />
        </svg>
        Submit Review
                        </button>
    </form>
            </div>

  <!-- Sort Dropdown -->
  <div class="flex justify-end max-w-4xl mx-auto mt-6">
    <label class="text-yellow-300 mr-2">Sort by:</label>
    <select id="sortSelect" class="bg-gray-900 border border-gray-700 text-white p-1 rounded">
        <option value="recent">Most Recent</option>
      <option value="highest">Highest Rating</option>
      <option value="lowest">Lowest Rating</option>
      </select>
    </div>

        <!-- Reviews List -->
  <div id="reviewsList" class="max-w-4xl mx-auto mt-8 px-4"></div>

  <script>
  let currentUser = null;
  let currentUserType = null;
  let reviews = [];

  // Show notification
  function showNotification(message, type = 'success') {
    const notification = document.getElementById('notification');
    notification.innerHTML = `<div class="px-6 py-3 rounded shadow-lg mb-2 text-white ${type === 'success' ? 'bg-green-500' : 'bg-red-500'}">${message}</div>`;
    setTimeout(() => { notification.innerHTML = ''; }, 2500);
  }

  // Check user login status
  function checkUserStatus() {
    const memberData = localStorage.getItem('memberData');
    const adminData = localStorage.getItem('adminData');
    if (memberData) {
      currentUser = JSON.parse(memberData);
      currentUserType = 'member';
      document.getElementById('reviewFormSection').style.display = 'block';
    } else if (adminData) {
      currentUser = JSON.parse(adminData);
      currentUserType = 'admin';
      document.getElementById('reviewFormSection').style.display = 'none';
                } else {
      currentUserType = 'user';
      document.getElementById('reviewFormSection').style.display = 'none';
    }
  }

  // Update stats
  function updateStats() {
    const totalReviews = reviews.length;
    const avgRating = totalReviews > 0 ? (reviews.reduce((sum, review) => sum + review.rating, 0) / totalReviews).toFixed(1) : '0.0';
    
    document.getElementById('totalReviews').textContent = totalReviews;
    document.getElementById('avgRating').textContent = avgRating;
  }

  // Load all reviews
  async function loadReviews() {
    const container = document.getElementById('reviewsList');
    container.innerHTML = '<div class="text-center text-gray-400">Loading...</div>';
    try {
      const response = await fetch('/api/reviews');
                const data = await response.json();
                if (response.ok) {
        reviews = data.reviews;
        displayReviews();
        updateStats();
                } else {
        container.innerHTML = '<div class="text-center text-red-500">Failed to load reviews.</div>';
      }
    } catch (err) {
      container.innerHTML = '<div class="text-center text-red-500">Failed to load reviews.</div>';
    }
  }

  // Display reviews
  function displayReviews() {
    const container = document.getElementById('reviewsList');
    const sortBy = document.getElementById('sortSelect').value;
    
    // Sort reviews
    let sortedReviews = [...reviews];
    if (sortBy === 'recent') {
      sortedReviews.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    } else if (sortBy === 'highest') {
      sortedReviews.sort((a, b) => b.rating - a.rating);
    } else if (sortBy === 'lowest') {
      sortedReviews.sort((a, b) => a.rating - b.rating);
    }

    if (!sortedReviews.length) {
      container.innerHTML = '<p class="text-center text-gray-400">No reviews yet.</p>';
                return;
            }

    container.innerHTML = '';
    sortedReviews.forEach(review => {
      const canDelete = currentUserType === 'admin';
      container.innerHTML += `
        <div class="bg-gray-900 text-white rounded-md p-4 mb-4 border border-gray-700">
          <div class="flex justify-between items-start">
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-2">
                <span class="font-bold text-yellow-300">${review.title || 'Review'}</span>
                <span class="text-yellow-400">${'★'.repeat(review.rating)}${'☆'.repeat(5 - review.rating)}</span>
              </div>
              <div class="text-gray-300 mb-2">${review.content}</div>
              <div class="text-xs text-gray-400">by ${review.username || 'Member'} (${review.email}) on ${new Date(review.created_at).toLocaleString()}</div>
            </div>
            ${canDelete ? `<button onclick="deleteReview(${review.id})" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded text-sm">Delete</button>` : ''}
            </div>
          </div>
                    `;
                });
        }

  // Add review
  async function addReview(e) {
            e.preventDefault();
    const name = document.getElementById('memberName').value.trim();
    const email = document.getElementById('memberEmail').value.trim();
    const content = document.getElementById('reviewContent').value.trim();
    const rating = Array.from(document.querySelectorAll('.star')).filter(s => s.innerHTML === '★').length;
    
    if (!name || !email || !content || !rating) {
      showNotification('All fields are required!', 'error');
                return;
            }

            try {
      const response = await fetch('/api/reviews', {
                    method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          memberId: currentUser.id,
          title: 'Review',
          content,
          rating,
          memberName: name,
          memberEmail: email
        })
      });

                const data = await response.json();

                if (response.ok) {
        document.getElementById('reviewForm').reset();
        document.querySelectorAll('.star').forEach(s => s.innerHTML = '☆');
        showNotification('Review added successfully!');
                    loadReviews();
                } else {
        showNotification(data.error || 'Failed to add review.', 'error');
      }
    } catch (err) {
      showNotification('Failed to add review.', 'error');
    }
  }

  // Delete review (admin only)
  async function deleteReview(id) {
    if (!confirm('Are you sure you want to delete this review?')) return;
    try {
      const response = await fetch(`/api/reviews/${id}`, { method: 'DELETE' });
                if (response.ok) {
        showNotification('Review deleted successfully!');
            loadReviews();
            } else {
        showNotification('Failed to delete review.', 'error');
      }
    } catch (err) {
      showNotification('Failed to delete review.', 'error');
    }
  }

  function updateLogoutButton() {
    const memberData = localStorage.getItem('memberData');
    const adminData = localStorage.getItem('adminData');
    const logoutBtn = document.getElementById('logoutBtn');
    if (memberData || adminData) {
      logoutBtn.style.display = 'block';
                } else {
      logoutBtn.style.display = 'none';
    }
  }

  // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
    checkUserStatus();
            loadReviews();
    updateLogoutButton();

    // Star click logic
    const stars = document.querySelectorAll('.star');
    stars.forEach((star, idx) => {
      star.addEventListener('click', () => {
        stars.forEach((s, i) => {
          s.innerHTML = i <= idx ? '★' : '☆';
        });
      });
    });

    // Form submit
    const form = document.getElementById('reviewForm');
    if (form) {
      form.addEventListener('submit', addReview);
    }

    // Sort change
    const sortSelect = document.getElementById('sortSelect');
    if (sortSelect) {
      sortSelect.addEventListener('change', displayReviews);
    }

    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
      logoutBtn.addEventListener('click', function() {
        localStorage.removeItem('memberData');
        localStorage.removeItem('adminData');
        location.reload();
      });
    }
  });
    </script>
</body>
</html>
